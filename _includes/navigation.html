<nav class="site-nav" aria-label="Primary">
  <div class="nav-inner">
    <a class="brand" href="{{ '/' | relative_url }}">Ruurd Kuiper</a>
    <ul class="nav-links">
      {% for item in site.nav %}
        {% assign is_active = false %}
        {% if page.url == item.url %}
          {% assign is_active = true %}
        {% endif %}
        {% if item.url == '/' and page.url == '/' %}
          {% assign is_active = true %}
        {% endif %}
        <li>
          <a href="{{ item.url | relative_url }}" {% if is_active %}class="active" aria-current="page"{% endif %}>{{ item.title }}</a>
        </li>
      {% endfor %}
    </ul>
    <div class="theme-switcher">
      <button class="theme-btn active" data-theme="light" onclick="switchTheme('light')" title="Light theme" aria-label="Light theme">☀️</button>
      <button class="theme-btn" data-theme="nord" onclick="switchTheme('nord')" title="Nord theme" aria-label="Nord theme">🏔️</button>
      <button class="theme-btn" data-theme="dark" onclick="switchTheme('dark')" title="Dark theme" aria-label="Dark theme">🌙</button>
    </div>
  </div>
</nav>
