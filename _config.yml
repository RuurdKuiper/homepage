locale: "en-US"
site_theme: "default"
title: ""
title_separator: ""
name: "Ruurd Kuiper"
description: "Academic homepage of Ruurd Kuiper, Assistant Professor in AI and NLP for Healthcare at UMC Utrecht."
url: "https://ruurdkuiper.com"
baseurl: ""
repository: "RuurdKuiper/homepage"

author:
  avatar: "Ruurd.jpeg"
  name: "Ruurd Kuiper"
  bio: "Assistant Professor in AI and NLP for Healthcare at UMC Utrecht."
  location: "Utrecht, the Netherlands"
  employer: "UMC Utrecht"
  uri: "https://ruurdkuiper.com"
  email:
  googlescholar: "https://scholar.google.com/citations?user=E968uWQAAAAJ&hl=nl"
  orcid: "https://orcid.org/0000-0002-6511-3896"
  github: "RuurdKuiper"
  linkedin: "ruurd-kuiper"
  huggingface: "https://huggingface.co/Ruurd/spaces"
  cv_pdf: "/Academic%20Cv%20%E2%80%94%20Ruurd%20Kuiper.pdf"

publication_category:
  manuscripts:
    title: "Selected Publications"

breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"
talkmap_link: false

include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - README.md
  - tmp
  - vendor

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: false
      comments: false
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: false
      comments: false
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: false
      comments: false
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: false

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Europe/Amsterdam

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

compress_html:
  clippings: all
  ignore:
    envs: development
